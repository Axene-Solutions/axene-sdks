name: ci

# Test jobs only run when the triggering commit message (or PR title) contains
# the marker "[test]". This keeps routine pushes from burning Actions minutes;
# releases always run their own tests in release.yml regardless of this.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
      - run: npm run build

  dotnet:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test packages/dotnet/tests/Axene.Mailer.Tests.csproj -c Release

  java:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: ./gradlew test --no-daemon

  python:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: python -m pytest

  rust:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  ruby:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: bundle exec rake test

  php:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/php
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: composer install --no-interaction
      - run: ./vendor/bin/phpunit

  go:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test ./...

  swift:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: macos-14
    defaults:
      run:
        working-directory: packages/swift
    steps:
      - uses: actions/checkout@v4
      - run: swift test
