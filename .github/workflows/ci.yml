name: ci

# Test jobs only run when the triggering commit message (or PR title) contains
# the marker "[test]". This keeps routine pushes from burning Actions minutes;
# releases always run their own tests in release.yml regardless of this.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
      - run: npm run build

  dotnet:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test packages/dotnet/tests/Axene.Mailer.Tests.csproj -c Release

  java:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: ./gradlew test --no-daemon

  python:
    if: contains(github.event.head_commit.message, '[test]') || contains(github.event.pull_request.title, '[test]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: python -m pytest
