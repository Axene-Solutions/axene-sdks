name: release

# Per-package releases via tag prefix:
#   git tag ts-v0.1.0     && git push --tags   -> publishes @axene/mailer to npm
#   git tag dotnet-v0.1.0 && git push --tags   -> publishes Axene.Mailer to NuGet
on:
  push:
    tags:
      - 'ts-v*'
      - 'dotnet-v*'
      - 'java-v*'
      - 'py-v*'

jobs:
  # ---- TypeScript -> npm (with provenance; needs NPM_TOKEN secret) ----
  npm:
    if: startsWith(github.ref, 'refs/tags/ts-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required for npm provenance
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm test
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---- .NET -> NuGet via Trusted Publishing (OIDC, no API key) ----
  nuget:
    if: startsWith(github.ref, 'refs/tags/dotnet-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required to exchange the OIDC token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Test
        run: dotnet test packages/dotnet/tests/Axene.Mailer.Tests.csproj -c Release
      - name: Pack
        run: dotnet pack packages/dotnet/Axene.Mailer.csproj -c Release -o ${{ runner.temp }}/nupkg
      - name: NuGet trusted-publishing login
        uses: NuGet/login@v1
        id: login
        with:
          user: kentom        # your nuget.org username (the policy's Package Owner)
      - name: Push
        run: >
          dotnet nuget push "${{ runner.temp }}/nupkg/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # ---- Java -> Maven Central via the Sonatype Central Portal ----
  maven:
    if: startsWith(github.ref, 'refs/tags/java-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Publish + release
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralUsername }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralPassword }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKey }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKeyPassword }}

  # ---- Python -> PyPI via Trusted Publishing (OIDC, no token) ----
  pypi:
    if: startsWith(github.ref, 'refs/tags/py-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for PyPI trusted publishing
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]" build
      - run: python -m pytest          # tests gate the release
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
