[package]
name = "axene-mailer"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Async Rust SDK for the Axene Mailer API (send email, manage domains, contacts, suppressions, templates, and webhooks)."
repository = "https://github.com/Axene-Solutions/axene-sdks"
homepage = "https://github.com/Axene-Solutions/axene-sdks"
documentation = "https://docs.rs/axene-mailer"
readme = "README.md"
keywords = ["email", "axene", "mailer", "transactional", "sdk"]
categories = ["api-bindings", "email"]

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["time"] }

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
base64 = "0.22"
